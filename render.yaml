services:
  - type: web
    name: bigronjones-backend
    runtime: node
    region: ohio
    plan: starter
    buildCommand: cd backend && npm install
    startCommand: npm start --workspace=backend
    envVars:
      - key: PORT
        value: 8080
      - key: FRONTEND_ORIGIN
        value: https://bigronjones-deploy-741x.vercel.app
      - key: NODE_ENV
        value: production
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_CHECKOUT_LINK
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: CRON_SECRET
        sync: false
      - key: CALENDLY_WEBHOOK_SECRET
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM_NAME
        sync: false
      - key: CONTACT_INBOX_EMAIL
        sync: false
      - key: ADMIN_EMAILS
        sync: false
